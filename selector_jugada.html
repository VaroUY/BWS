<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>MODAL</title>
</head>
<script type="text/javascript" src="_js/bws_popUp.js"></script>

<script type="text/javascript">

    cadVariables = location.search.substring(1,location.search.length);
    arrVariables = cadVariables.split("&");
    for (i=0; i<arrVariables.length; i++) {
        arrVariableActual = arrVariables[i].split("=");
        if (isNaN(parseFloat(arrVariableActual[1])))
            eval(arrVariableActual[0]+"='"+unescape(arrVariableActual[1])+"';");
        else
            eval(arrVariableActual[0]+"="+arrVariableActual[1]+";");
    }
    alert(arrVariables);
    alert(arrVariableActual[1]);
    window.onload = muestraVarModal();

</script>

<body>   

<div id="modalSelector">

    <p id="modalTitulo" style="margin-top: 5px;align-self: center; ">
                    FINALIZAR MOVIMIENTO  
    </p>
    <p> TURNO : <span id="modalJugador">Sin comenzar</span></p> 

    <img id="popUpOpcionEmpresa1" > 
    <img src="file:_imagenes/PopUpMcDonalds.png"> 
    <img src="file:_imagenes/PopUpNike.png"> 

    <form action="" method="get" style="background-color: none;">
        <p>
            <input type="radio" name="modalRadio" id="modal_H_Radio" value="H" style="margin-left: 23px;cursor: pointer;" onclick="muestraVarModal()">
            <label for="HeinekenValue"></label>

            <input type="radio" name="modalRadio" id="modal_G_Radio" value="G" style="margin-left: 45px;cursor: pointer;" onclick="calcularPorRadio2('G')">
            <label for="GatoradeValue"></label>

            <input type="radio" name="modalRadio" id="modal_N_Radio" value="N" style="margin-left: 45px;cursor: pointer;" onclick="calcularPorRadio2('N')">
            <label for="NikeValue"></label>

            <br>
            <br>
            <input id="modalEjecutar" type="button" value="EJECUTAR" onclick = "calcularModal()">
        </p>
    </form>     
 </div>

</body>
</html>
